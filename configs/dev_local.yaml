mode: local

data:
  root: ./data
  cache: ./cache

model:
  name: hawp_laq_base
  model_id: facebook/opt-125m
  backbone: resnet50
  pretrained: null
  torch_dtype: float32
  load_in_4bit: false

generation:
  max_new_tokens: 32
  do_sample: false
  temperature: 1.0
  top_p: 1.0
  prompts:
    - "Hello, my name is"
    - "The capital of France is"

calib:
  nsamples: 2
  seq_len: 64
  output_dir: artifacts/calib
  dataset: wikitext2

projector:
  rank: null
  r_k: 32
  r_v: 45
  lr: 0.002
  n_steps: 2500
  orthogonalize_every: 10
  target_layer: 0
  w_logits: 1.0
  w_attn: 1.0
  w_value: 0.5
  output_dir: artifacts/projectors

rank_search:
  n_steps: 1500
  selection_abs_tolerance: 0.01
  output_dir: artifacts/ranks

quant:
  enabled: true
  k_method: turbo_prod
  v_method: turbo_mse
  k_bits: 4
  v_bits: 8
  use_rotation_for_k: true
  use_rotation_for_v: true
  k_group_size: 128
  v_group_size: 128
  outlier_threshold: null

train:
  batch_size: 4
  epochs: 100
  lr: 1.0e-4
  device: cuda

sched:
  total_budget: 32
  recent_window: 8
  high_ratio: 0.25
  low_ratio: 0.50
  drop_strategy: position

log:
  level: DEBUG
  dir: ./logs
