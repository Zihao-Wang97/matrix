mode: server

data:
  root: /data/hawp_laq
  cache: /tmp/hawp_laq_cache

model:
  model_id: /data/models/Llama-2-7b-hf
  torch_dtype: float16
  load_in_4bit: true

generation:
  max_new_tokens: 256
  do_sample: true
  temperature: 0.7
  top_p: 0.9
  prompts:
    - "Once upon a time"

calib:
  nsamples: 128
  seq_len: 2048
  output_dir: /data/hawp_laq/artifacts/calib
  dataset: wikitext2

projector:
  rank: null
  r_k: 32
  r_v: 32
  lr: 0.0005
  n_steps: 500
  orthogonalize_every: 20
  target_layer: 0
  w_logits: 1.0
  w_attn: 1.0
  w_value: 0.5
  output_dir: /data/hawp_laq/artifacts/projectors

quant:
  enabled: true
  k_method: turbo_prod
  v_method: turbo_mse
  k_bits: 4
  v_bits: 8
  use_rotation_for_k: true
  use_rotation_for_v: true
  k_group_size: 128
  v_group_size: 128
  outlier_threshold: null

sched:
  total_budget: 4096
  recent_window: 64
  high_ratio: 0.25
  low_ratio: 0.60

rank_search:
  rank_candidates:
    - 16
    - 32
    - 64
    - 128
    - 256
  output_dir: /data/hawp_laq/artifacts/ranks

train:
  batch_size: 32
  epochs: 100
  lr: 1.0e-4
  device: cuda

log:
  level: INFO
  dir: /var/log/hawp_laq

hawp:
  logit_scale_mode: "rk"
  gamma_mode: "learned"
  gamma_value: null
  use_archive_k_ip_approx: true

serving:
  host: 0.0.0.0
  port: 8080
  workers: 4
