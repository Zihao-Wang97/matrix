mode: server

data:
  root: /data/hawp_laq
  cache: /tmp/hawp_laq_cache

model:
  model_id: /data/models/Llama-2-7b-hf
  torch_dtype: float16
  load_in_4bit: true

generation:
  max_new_tokens: 256
  do_sample: true
  temperature: 0.7
  top_p: 0.9
  prompts:
    - "Once upon a time"

calib:
  nsamples: 128
  seq_len: 2048
  output_dir: /data/hawp_laq/artifacts/calib
  dataset: wikitext2

projector:
  rank: null
  r_k: 32
  r_v: 32
  lr: 0.0005
  n_steps: 1500
  orthogonalize_every: 20
  target_layer: 0
  w_logits: 1.0
  w_attn: 1.0
  w_value: 0.5
  output_dir: /data/hawp_laq/artifacts/projectors
  optimizer: riemannian_adam
  warmup_steps: 50
  row_batch_size: 128
  lr_pk: 5e-3
  lr_pv: 5e-3
  lr_xi: 1e-2
  beta1: 0.9
  beta2: 0.99
  grad_clip: 1.0
  lambda_z: 1.0
  lambda_o: 2.0
  lambda_v: 0.05
  eval_every: 50
  early_stopping: true
  patience: 5
  min_delta: 1e-4
  min_delta_mode: relative
  gamma_min: 1e-4
  eps_loss: 1e-8
  adam_eps: 1e-8

quant:
  enabled: true
  k_method: turbo_prod
  v_method: turbo_mse
  k_bits: 4
  v_bits: 8
  use_rotation_for_k: true
  use_rotation_for_v: true
  k_group_size: 128
  v_group_size: 128
  outlier_threshold: null

sched:
  total_budget: 4096
  recent_window: 64
  high_ratio: 0.25
  low_ratio: 0.60

rank_search:
  selection_mode: signal_normalized
  logits_signal_tolerance: 0.01
  attn_signal_tolerance: 0.01
  value_signal_tolerance: 0.02
  r_k_candidates: [32, 48, 64]
  r_v_candidates: [16, 32, 48, 64]
  output_dir: /data/hawp_laq/artifacts/ranks
  layer_tolerance_scale:
    - layers: [0, 1, 2, 3]
      scale: 1.5
    - layers: [4, 5, 6, 7, 8]
      scale: 1.0
    - layers: [9, 10, 11]
      scale: 0.5
  layer_rank_floor:
    - layers: [0, 1, 2, 3]
      min_r_k: 48
      min_r_v: 32
    - layers: [4, 5, 6, 7, 8]
      min_r_k: 64
      min_r_v: 48
    - layers: [9, 10, 11]
      min_r_k: 64
      min_r_v: 64

train:
  batch_size: 32
  epochs: 100
  lr: 1.0e-4
  device: cuda

log:
  level: INFO
  dir: /var/log/hawp_laq

hawp:
  logit_scale_mode: "rk"
  gamma_mode: "learned"
  gamma_value: null
  use_archive_k_ip_approx: true

serving:
  host: 0.0.0.0
  port: 8080
  workers: 4
